- name: Bootstrap nodes with admin user and keys
  hosts: all
  tasks:

  - name: install sudo package
    ansible.builtin.apt:
      name: sudo
      update_cache: true

  - name: create user for ssh and ansible
    ansible.builtin.user:
      name: admin
      groups: sudo

  - name: Send ssh keys
    ansible.posix.authorized_key: 
      user: admin
      key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"